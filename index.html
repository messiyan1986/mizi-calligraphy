<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>米字格书法练习工具</title>
<style>
/* ===== 内置字体声明 ===== */
@font-face {
  font-family: 'BuMing';
  src: url('fonts/BuMing.ttf') format('truetype');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'SourceHanSerifBold';
  src: url('fonts/SourceHanSerif-Bold.otf') format('opentype');
  font-weight: bold; font-style: normal;
}
@font-face {
  font-family: 'SourceHanSerifHeavy';
  src: url('fonts/SourceHanSerif-Heavy.otf') format('opentype');
  font-weight: bold; font-style: normal;
}
:root{
  --bg:#f5f0e8;
  --card:#fffdf7;
  --border:#d4c5a9;
  --accent:#8b4513;
  --accent-l:#a0522d;
  --accent-d:#6b3410;
  --text:#3e2c1c;
  --muted:#8b7355;
  --red:#c0392b;
  --shadow:0 2px 12px rgba(62,44,28,.1);
  --radius:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"SimSun","宋体",serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

/* === Header === */
.hdr{
  background:linear-gradient(135deg,#6b3410 0%,#8b4513 40%,#a0522d 60%,#8b4513 100%);
  color:#fffdf7;text-align:center;padding:16px 20px;
  font-size:24px;font-weight:bold;letter-spacing:8px;
  box-shadow:0 3px 10px rgba(0,0,0,.2);position:relative;
  text-shadow:1px 1px 3px rgba(0,0,0,.3);
}
.hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent 5%,#ffd700 30%,#ffd700 70%,transparent 95%);
}
.hdr-sub{font-size:12px;font-weight:normal;letter-spacing:3px;opacity:.75;margin-top:2px}

/* === Layout === */
.wrap{max-width:1440px;margin:0 auto;padding:16px;display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}

/* === Sidebar === */
.side{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;position:sticky;top:16px;
  max-height:calc(100vh - 100px);overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.side::-webkit-scrollbar{width:6px}
.side::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* === Panel Sections === */
.pt{
  font-size:14px;font-weight:bold;color:var(--accent);
  border-left:3px solid var(--accent);padding-left:10px;
  margin-bottom:12px;letter-spacing:2px;
}
.sg{margin-bottom:4px}
.dv{height:1px;background:var(--border);margin:14px 0}
.sl{font-size:13px;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.sl .v{color:var(--accent);font-weight:bold;min-width:32px;text-align:right}

/* === Inputs === */
input[type="number"],input[type="text"],select,textarea{
  width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:4px;
  font-size:13px;background:#fff;color:var(--text);transition:border-color .2s;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(139,69,19,.15);
}
textarea{resize:vertical;min-height:80px;font-family:inherit;line-height:1.6}

/* Range slider */
input[type="range"]{
  -webkit-appearance:none;width:100%;height:6px;border-radius:3px;
  background:linear-gradient(90deg,var(--border),var(--accent-l));
  outline:none;margin:4px 0 2px;cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer;
}
input[type="range"]::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;
  background:var(--accent);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer;
}

/* === Toggle Switch === */
.tr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tr label:first-child{font-size:13px}
.tg{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
.tg input{opacity:0;width:0;height:0}
.tg .s{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:#ccc;border-radius:24px;transition:.3s;
}
.tg .s::before{
  content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.tg input:checked+.s{background:var(--accent)}
.tg input:checked+.s::before{transform:translateX(20px)}

/* === Buttons === */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:9px 16px;border:none;border-radius:4px;font-size:13px;
  cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:1px;
}
.bp{background:var(--accent);color:#fff;width:100%;margin-top:8px}
.bp:hover{background:var(--accent-l);transform:translateY(-1px);box-shadow:0 2px 8px rgba(139,69,19,.3)}
.bs{background:#e8ddd0;color:var(--text);width:100%;margin-top:6px}
.bs:hover{background:#ddd0c0;transform:translateY(-1px)}
.br{display:flex;gap:8px;margin-top:8px}
.br .btn{flex:1}

/* === Font Tags === */
.fp{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ft{
  font-size:12px;padding:4px 12px;border:1px solid var(--border);
  border-radius:14px;cursor:pointer;background:#f8f4ec;transition:all .2s;color:var(--text);
}
.ft:hover{background:#ede4d4;border-color:var(--accent-l)}
.ft.a{background:var(--accent);color:#fff;border-color:var(--accent)}
.ft.c{background:#e74c3c;color:#fff;border-color:#e74c3c}

/* === Color Input === */
.clr-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.clr-row label{font-size:13px;flex:1}
input[type="color"]{
  width:36px;height:28px;padding:1px;border:1px solid var(--border);
  border-radius:4px;cursor:pointer;background:#fff;
}

/* === Custom Font Items === */
.cf{margin-top:8px}
.fi{
  display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px;
  color:var(--muted);background:#f8f4ec;padding:6px 8px;border-radius:4px;
}
.fi .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi .rx{cursor:pointer;color:var(--red);font-size:16px;line-height:1}
.fh{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}

/* === Main Canvas Area === */
.main{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:20px;min-height:500px;
  display:flex;flex-direction:column;align-items:center;
}
.pager{display:flex;align-items:center;gap:12px;margin-top:14px;padding:8px 0}
.page-info{font-size:14px;color:var(--accent);font-weight:bold;min-width:80px;text-align:center}
.gi{font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center;letter-spacing:1px}
#cv{border:2px solid var(--red);background:#fff;border-radius:2px;max-width:100%}

/* === Print === */
@media print{
  .hdr,.side{display:none!important}
  .wrap{display:block;padding:0}
  .main{border:none;box-shadow:none;padding:10px}
  #cv{border:none;max-width:100%}
}

/* === Responsive === */
@media(max-width:860px){
  .wrap{grid-template-columns:1fr}
  .side{position:static;max-height:none}
  .hdr{font-size:20px;letter-spacing:4px}
}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  米 字 格 书 法 练 习
  <div class="hdr-sub">笔墨纸砚 · 静心习字</div>
</div>

<div class="wrap">
<!-- ===== Left Sidebar ===== -->
<div class="side">

  <!-- Text Input -->
  <div class="sg">
    <div class="pt">文字输入</div>
    <textarea id="inputText" placeholder="在此粘贴或输入要练习的文字..." oninput="convertText()">永和九年岁在癸丑暮春之初</textarea>
    <div class="tr">
      <label>转为繁体</label>
      <label class="tg"><input type="checkbox" id="togTC" onchange="convertText()"><span class="s"></span></label>
    </div>
    <div id="convLabel" style="font-size:11px;color:var(--muted);margin-bottom:4px">当前：简体</div>
    <div class="tr">
      <label>去除标点</label>
      <label class="tg"><input type="checkbox" id="togPunc" onchange="convertText()" checked><span class="s"></span></label>
    </div>
    <div class="tr">
      <label>竖版排列</label>
      <label class="tg"><input type="checkbox" id="togVertical" onchange="render()"><span class="s"></span></label>
    </div>
  </div>

  <div class="dv"></div>

  <!-- Grid Settings -->
  <div class="sg">
    <div class="pt">网格设置</div>
    <div class="sl">格子大小 <span class="v" id="csV">80</span>px</div>
    <input type="range" id="cs" min="40" max="200" value="80" oninput="$('csV').textContent=this.value;resetRender()">

    <div class="sl" style="margin-top:10px">列数 <span class="v" id="coV">8</span></div>
    <input type="range" id="co" min="1" max="20" value="8" oninput="$('coV').textContent=this.value;resetRender()">

    <div class="sl" style="margin-top:10px">行数 <span class="v" id="roV">4</span></div>
    <input type="range" id="ro" min="1" max="20" value="4" oninput="$('roV').textContent=this.value;resetRender()">

    <div class="sl" style="margin-top:10px">间距 <span class="v" id="gpV">2</span>px</div>
    <input type="range" id="gp" min="0" max="20" value="2" oninput="$('gpV').textContent=this.value;resetRender()">

    <div class="sl" style="margin-top:10px">边框粗细 <span class="v" id="bwV">2</span>px</div>
    <input type="range" id="bw" min="1" max="6" value="2" oninput="$('bwV').textContent=this.value;resetRender()">

    <div class="sl" style="margin-top:10px">字号偏移 <span class="v" id="foV">0</span>px</div>
    <input type="range" id="fo" min="-20" max="20" value="0" oninput="$('foV').textContent=this.value;resetRender()">
  </div>

  <div class="dv"></div>

  <!-- Font Settings -->
  <div class="sg">
    <div class="pt">字体设置</div>
    <div class="sl">预设字体</div>
    <div class="fp" id="fp">
      <span class="ft a" data-font="SimSun, 宋体, serif" onclick="selFont(this)">宋体</span>
      <span class="ft" data-font="BuMing, serif" onclick="selFont(this)">不鸣体</span>
      <span class="ft" data-font="SourceHanSerifBold, serif" onclick="selFont(this)">思源宋体Bold</span>
      <span class="ft" data-font="SourceHanSerifHeavy, serif" onclick="selFont(this)">思源宋体Heavy</span>
    </div>

    <div style="margin-top:14px">
      <div class="sl">自定义字体</div>
      <p class="fh">可粘贴 @font-face CSS 声明，或直接加载本地字体文件（.ttf/.otf/.woff/.woff2）。</p>
      <textarea id="ffInput" rows="3" placeholder="@font-face { font-family:'MyFont'; src:url('fonts/myfont.ttf'); }" style="margin-top:6px;font-size:11px;font-family:monospace"></textarea>
      <div class="br">
        <button class="btn bs" onclick="applyFF()">应用声明</button>
        <button class="btn bs" onclick="$('ffFile').click()">加载字体文件</button>
      </div>
      <input type="file" id="ffFile" accept=".ttf,.otf,.woff,.woff2" multiple style="display:none" onchange="loadFF(event)">
      <div id="cfList" class="cf"></div>
      <p class="fh" style="margin-top:6px">为已加载的字体添加标签，以便快速切换：</p>
      <div class="br">
        <input type="text" id="cfName" placeholder="输入字体标签名称" style="flex:1">
        <button class="btn bs" style="width:auto;padding:8px 14px" onclick="addFT()">添加标签</button>
      </div>
    </div>
  </div>

  <div class="dv"></div>

  <!-- Display Settings -->
  <div class="sg">
    <div class="pt">显示设置</div>
    <div class="clr-row">
      <label>边框颜色</label>
      <input type="color" id="bc" value="#c0392b" onchange="render()">
    </div>
    <div class="clr-row">
      <label>辅助线颜色</label>
      <input type="color" id="gc" value="#e8b4b8" onchange="render()">
    </div>
    <div class="tr">
      <label>显示辅助线</label>
      <label class="tg"><input type="checkbox" id="sg" checked onchange="render()"><span class="s"></span></label>
    </div>
    <div class="tr">
      <label>显示边框</label>
      <label class="tg"><input type="checkbox" id="sb" checked onchange="render()"><span class="s"></span></label>
    </div>
    <div class="clr-row">
      <label>文字颜色</label>
      <input type="color" id="tc" value="#1a1a1a" onchange="render()">
    </div>
  </div>

  <div class="dv"></div>

  <!-- Action Buttons -->
  <button class="btn bp" onclick="render()">&#8635; 刷新显示</button>
  <button class="btn bs" onclick="exportImg()">&#128196; 导出为图片</button>
  <button class="btn bs" onclick="window.print()">&#128424; 打印</button>

</div>

<!-- ===== Right Main Area ===== -->
<div class="main">
  <div class="gi" id="gi">文字将自动排列到米字格中</div>
  <canvas id="cv"></canvas>
  <div class="pager" id="pager" style="display:none">
    <button class="btn bp" id="prevPage" onclick="goPage(-1)" style="width:auto;padding:6px 16px;margin:0">&#9664; 上一页</button>
    <span class="page-info" id="pageInfo">1 / 1</span>
    <button class="btn bp" id="nextPage" onclick="goPage(1)" style="width:auto;padding:6px 16px;margin:0">下一页 &#9654;</button>
  </div>
</div>
</div>

<script>
// ==========================================
//  Utility
// ==========================================
const $ = id => document.getElementById(id);

// ==========================================
//  State
// ==========================================
let curFont = 'SimSun, 宋体, serif';
let customFontNames = []; // { name, fontFamily }
let customFontStyles = []; // { name, styleText }
let currentPage = 0;

// ==========================================

  $('convLabel').textContent = isTC ? '当前：繁体' : '当前：简体';
  render();
}

// ==========================================
//  selFont - 选择字体
// ==========================================
function selFont(el) {
  document.querySelectorAll('#fp .ft').forEach(t => t.classList.remove('a'));
  el.classList.add('a');
  curFont = el.getAttribute('data-font');
  render();
}

// ==========================================
//  applyFF - 应用 @font-face 声明
// ==========================================
function applyFF() {
  const text = $('ffInput').value.trim();
  if (!text) return;
  try {
    const style = document.createElement('style');
    style.textContent = text;
    document.head.appendChild(style);
    // Extract font-family name
    const m = text.match(/font-family\s*:\s*['"]?([^'";\s]+)/);
    if (m) {
      const ffName = m[1];
      const label = ffName;
      const idx = customFontNames.findIndex(f => f.name === label);
      if (idx === -1) {
        customFontNames.push({ name: label, fontFamily: ffName });
        customFontStyles.push({ name: label, styleEl: style });
        renderCustomFontList();
      }
    }
    $('ffInput').value = '';
    alert('@font-face 声明已应用！');
    render();
  } catch (e) {
    alert('声明格式有误：' + e.message);
  }
}

// ==========================================
//  loadFF - 加载字体文件（FileReader -> data URL -> @font-face）
// ==========================================
function loadFF(event) {
  const files = event.target.files;
  if (!files.length) return;
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const dataUrl = e.target.result;
      const fontName = file.name.replace(/\.[^.]+$/, '');
      const ext = file.name.split('.').pop().toLowerCase();
      let format = 'woff2';
      if (ext === 'ttf') format = 'truetype';
      else if (ext === 'otf') format = 'opentype';
      else if (ext === 'woff') format = 'woff';
      else if (ext === 'woff2') format = 'woff2';

      const ffDecl = `@font-face { font-family: '${fontName}'; src: url('${dataUrl}') format('${format}'); font-weight: normal; font-style: normal; }`;
      const style = document.createElement('style');
      style.textContent = ffDecl;
      document.head.appendChild(style);

      customFontNames.push({ name: fontName, fontFamily: fontName });
      customFontStyles.push({ name: fontName, styleEl: style });
      renderCustomFontList();

      // Wait for font to load then re-render
      document.fonts.ready.then(() => render());
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

// ==========================================
//  addFT - 添加自定义字体标签
// ==========================================
function addFT() {
  const name = $('cfName').value.trim();
  if (!name) return;
  // Check if there's a loaded custom font to link
  const customFont = customFontNames.find(f => f.name === name);
  const fontFamily = customFont ? customFont.fontFamily : name;

  const container = $('fp');
  const tag = document.createElement('span');
  tag.className = 'ft c';
  tag.setAttribute('data-font', fontFamily + ', sans-serif');
  tag.textContent = name;
  tag.onclick = function() { selFont(this); };
  container.appendChild(tag);
  $('cfName').value = '';
}

// ==========================================
//  renderCustomFontList - 刷新自定义字体列表
// ==========================================
function renderCustomFontList() {
  const container = $('cfList');
  container.innerHTML = '';
  customFontNames.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'fi';
    div.innerHTML = `<span class="fn" title="${f.fontFamily}">${f.name}</span><span class="rx" onclick="removeCF(${i})" title="移除">&times;</span>`;
    container.appendChild(div);
  });
}

function removeCF(idx) {
  if (idx >= 0 && idx < customFontStyles.length) {
    const s = customFontStyles[idx];
    if (s.styleEl && s.styleEl.parentNode) s.styleEl.parentNode.removeChild(s.styleEl);
    customFontNames.splice(idx, 1);
    customFontStyles.splice(idx, 1);
    renderCustomFontList();
    render();
  }
}

// ==========================================
//  goPage - 翻页
// ==========================================
function goPage(delta) {
  currentPage += delta;
  render();
}

// ==========================================
//  exportImg - 导出Canvas为PNG
// ==========================================
function exportImg() {
  const canvas = $('cv');
  const link = document.createElement('a');
  link.download = '米字格书法_' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ==========================================
//  resetRender - 重置页码并重新绘制
// ==========================================
function resetRender() { currentPage = 0; render(); }

// ==========================================
//  render - 核心绘制函数
// ==========================================
function render() {
  const canvas = $('cv');
  const ctx = canvas.getContext('2d');

  // Read settings
  const cellSize = parseInt($('cs').value) || 80;
  const cols = parseInt($('co').value) || 8;
  const rows = parseInt($('ro').value) || 4;
  const gap = parseInt($('gp').value) || 2;
  const borderWidth = parseInt($('bw').value) || 2;
  const fontOffset = parseInt($('fo').value) || 0;
  const borderColor = $('bc').value;
  const guideColor = $('gc').value;
  const textColor = $('tc').value;
  const showGuide = $('sg').checked;
  const showBorder = $('sb').checked;

  // Text
  let text = $('inputText').value;
  if ($('togTC').checked) text = toTC(text);
  // Remove whitespace/newlines
  text = text.replace(/[\s\r\n]/g, '');
  // Remove punctuation if enabled
  if ($('togPunc').checked) {
    text = text.replace(/[，。！？、；：""''（）《》【】…—·\-\s\.\,\!\?\;\:\"\'\(\)\[\]\{\}\<\>\/\\@#\$%\^&\*\+=~`\|，。！？、；：""''（）《》【】…—·\u3000]/g, '');
  }
  const chars = [...text];
  const isVertical = $('togVertical').checked;

  // Paging
  const perPage = cols * rows;
  const totalPages = Math.max(1, Math.ceil(chars.length / perPage));
  if (currentPage >= totalPages) currentPage = totalPages - 1;
  if (currentPage < 0) currentPage = 0;
  const pageOffset = currentPage * perPage;
  const pageChars = chars.slice(pageOffset, pageOffset + perPage);

  // Canvas sizing
  const totalW = cols * cellSize + (cols - 1) * gap;
  const totalH = rows * cellSize + (rows - 1) * gap;
  const padding = 10;
  canvas.width = totalW + padding * 2;
  canvas.height = totalH + padding * 2;

  // Clear
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Font
  const fontSize = Math.max(10, cellSize + fontOffset);
  ctx.font = `${fontSize}px ${curFont}`;
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Info
  const layoutMode = isVertical ? '竖版' : '横版';
  $('gi').textContent = `${layoutMode} · 共 ${chars.length} 个字 · 第 ${currentPage + 1}/${totalPages} 页 · ${cols}列 × ${rows}行 · ${cellSize}px`;

  // Pager visibility & buttons
  const pager = $('pager');
  if (totalPages <= 1) { pager.style.display = 'none'; }
  else { pager.style.display = 'flex'; }
  $('prevPage').disabled = currentPage <= 0;
  $('nextPage').disabled = currentPage >= totalPages - 1;
  $('prevPage').style.opacity = currentPage <= 0 ? '0.4' : '1';
  $('nextPage').style.opacity = currentPage >= totalPages - 1 ? '0.4' : '1';
  $('pageInfo').textContent = `${currentPage + 1} / ${totalPages}`;

  // Draw each cell
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // Character index: horizontal = row-major; vertical = column-major (right to left)
      const idx = isVertical ? ((cols - 1 - c) * rows + r) : (r * cols + c);
      const x = padding + c * (cellSize + gap);
      const y = padding + r * (cellSize + gap);
      const cx = x + cellSize / 2;
      const cy = y + cellSize / 2;

      // Draw guide lines (米字: cross + diagonals)
      if (showGuide) {
        ctx.strokeStyle = guideColor;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 3]);

        // Vertical center
        ctx.beginPath();
        ctx.moveTo(cx, y);
        ctx.lineTo(cx, y + cellSize);
        ctx.stroke();

        // Horizontal center
        ctx.beginPath();
        ctx.moveTo(x, cy);
        ctx.lineTo(x + cellSize, cy);
        ctx.stroke();

        // Diagonal: top-left to bottom-right
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + cellSize, y + cellSize);
        ctx.stroke();

        // Diagonal: top-right to bottom-left
        ctx.beginPath();
        ctx.moveTo(x + cellSize, y);
        ctx.lineTo(x, y + cellSize);
        ctx.stroke();

        ctx.setLineDash([]);
      }

      // Draw border
      if (showBorder) {
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = borderWidth;
        ctx.strokeRect(x, y, cellSize, cellSize);
      }

      // Draw character
      if (idx < pageChars.length) {
        ctx.fillStyle = textColor;
        ctx.font = `${fontSize}px ${curFont}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pageChars[idx], cx, cy + fontOffset * 0.15);
      }
    }
  }
}

// ==========================================
//  Init: render on page load
// ==========================================
window.addEventListener('load', () => {
  render();
});

// Re-render when text input changes (debounced)
let renderTimer = null;
$('inputText').addEventListener('input', () => {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => render(), 100);
});
</script>
</body>
</html>
